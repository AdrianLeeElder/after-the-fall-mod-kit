name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download BepInEx IL2CPP payload
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path downloads | Out-Null
          $zip = Join-Path $PWD 'downloads\BepInEx-Unity.IL2CPP-win-x64-6.0.0-be.757+77d438c.zip'
          $url = 'https://builds.bepinex.dev/projects/bepinex_be/757/BepInEx-Unity.IL2CPP-win-x64-6.0.0-be.757%2B77d438c.zip'
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath downloads\bepinex_extract -Force

      - name: Build installer
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\Build-AfterTheFallVRModKitPackage.ps1 -GameRoot .\downloads\bepinex_extract

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AfterTheFallVRModKitInstaller
          path: |
            dist/AfterTheFallVRModKitInstaller.exe
            dist/AfterTheFallVRModKit.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ github.ref_name }}'
          gh release create $tag `
            dist\AfterTheFallVRModKitInstaller.exe `
            dist\AfterTheFallVRModKit.zip `
            --title "After The Fall VR Mod Kit $tag" `
            --notes "Download and run AfterTheFallVRModKitInstaller.exe. Close After The Fall before applying changes." `
            --latest
